<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #4a9ee8 0%, #80c1ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
  }
  img {
    height: 180px;
    margin-bottom: 40px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
  }
  .tagline {
    color: white;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
  <div class="container">
    <img src="../public/logo-full.png" alt="Logo">
    <div class="tagline">48 UUR. DE REST IS RUIS.</div>
  </div>
</body>
</html>
